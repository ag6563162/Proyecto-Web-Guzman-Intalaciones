<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>Guzmán Instalaciones</title>
</head>
<body>
    <div>
        <header class="encabezado">
            <h2 class="titulo_p">Guzmán Instalaciones</h2>
            <nav class="navbar">
                <a class="Configuración" href="index.html">Inicio</a>
            <a class="Materiales" href="materiales.html">Materiales</a>
            <a class="Clientes" href="clientesfijo.html">Clientes fijos</a>
            <a class="Facturas" href="facturas.html">Facturas</a>
            </nav>
        </header>
        <div class="parrafos">
            <img src="img/Logo_AG.png" class="imag" alt="logo de AG">
            <P>Tel: 809-761-3393</P>
            <P>guzmaninstalaciones@gmail.com</P>
            <P>C/10, #10, Ricardo Tejada, Santiago, Rep. Dom</P>
            <input type="date" name="fecha" id="fecha">
        </div>
    </div>
    <div class="caja_contenedor">
          <form action="" method="post" >
    <div>
    <section class="content" id="datosclientes">
        <h2 class="titulo">Datos del cliente</h1>
        <i class="fa-solid fa-user"></i>
        <input type="text" class="nombre" id="nombre" placeholder="Nombre">
        <input type="texto" class="telefono" id="telefono" placeholder="Telefono">
        <input type="text" class="direccion" id="direccion" placeholder="Direccion">
        <input type="button" class="agregarclientes" value="Agregar cliente" onclick="agregarcliente()">
        <input type="button" class="mostrarcliente" value="Mostrar cliente" onclick="mostrarcliente()">
        <div id="resultado"></div>
    </section>
    </div>
    <div>
    <section class="content_2">
        <h2 class="titulo">Agregar producto</h2>
        <div class="inputs">
            <i class="fa-solid fa-cart-shopping"></i>
        <input type="text" class="producto" id="producto" placeholder="Nombre del producto"> 
        <input type="number" class="cantidad" id="cantidad" placeholder="Cantidad"> 
        <input type="text" class="precio" id="precio" placeholder="precio"> 
        <input type="button" value="+" id="agregarproducto" class="button">
        </div>
        <table class="tabla" id="tabla">
            <thead>
            <tr class="tabla_contenedor">
            <th class="producto">Productos</th>
            <th class="cantidad">Cantidad</th>
            <th class="precio">Precios</th>
            <th>Sub-Total</th>
            </tr>
            </thead>
            <tbody id="cuerpoTabla"></tbody>
        </table>
         <div class="total">
            <label for="total">Total</label>
            <input type="text" name="total" id="inputTotal" readonly>
            
        </div> 
    </section>
    </div>
    <div>
        <section class="forma_de_pago">
            <h2 class="titulo">Método de pago</h1>
                <i class="fa-solid fa-credit-card"></i>
            <input type="text" class="pago" list="opcionespago">
            <datalist id="opcionespago">
                <option value="Efectivo">
                <option value="Tarjeta">
                <option value="Transferencia">
            </datalist>
    </section>
        <br>
        <div class="boton-guardar">
        <button class="guardar" type="button" id="guardar" onclick="guardarDatos()">Guardar Factura</button>
        </div>
    </div>
    </form>
    </div>
    <script src="app.js"></script>
    <script src="productos.js"></script>
</body>
</html>
